<!DOCTYPE html>

<html lang="en">
    <head>
        <title>Premier League</title>
        <img class="logo" src="assets/pl.png">
        <img class="flag" src="assets/England.png">
    </head>
    <link href="teams.css" rel="stylesheet">
    <style>
        td{
            border-color: rgb(77, 9, 74);
        }

        .buttoncolor
        {
            border-color: rgb(255, 0, 242);
        }
</style>
    <body>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <header>
            <h2 style="position:absolute;top: 2vh; right: 3vw;">2025-2026</h2>
        </header>
        <main>
            <h2 style="position: absolute;left:24vw;top:8vh">Premier League Standings</h2>
            <table>
                <thead id="standings-head"></thead>
                <tbody id="standings-body"></tbody>
            </table>
                        <script>
                        // Fetch and display Premier League standings from CSV, including dynamic headers
                        fetch('standings/PremierLeague26.csv')
                            .then(response => response.text())
                            .then(data => {
                                const lines = data.trim().split(/\r?\n/);
                                if (lines.length === 0) return;
                                const head = document.getElementById('standings-head');
                                const tbody = document.getElementById('standings-body');
                                head.innerHTML = '';
                                tbody.innerHTML = '';
                                // Parse headers
                                const headers = lines[0].split(',');
                                const trHead = document.createElement('tr');
                                headers.forEach(h => {
                                    const th = document.createElement('th');
                                    th.textContent = h;
                                    trHead.appendChild(th);
                                });
                                head.appendChild(trHead);
                                // Parse rows
                                for (let i = 1; i < lines.length; i++) {
                                    // Handle quoted fields with commas
                                    const cols = [];
                                    let cur = '', inQuotes = false;
                                    for (let j = 0; j < lines[i].length; j++) {
                                        const char = lines[i][j];
                                        if (char === '"') inQuotes = !inQuotes;
                                        else if (char === ',' && !inQuotes) { cols.push(cur); cur = ''; }
                                        else cur += char;
                                    }
                                    cols.push(cur);
                                    const tr = document.createElement('tr');
                                    cols.forEach((col, idx) => {
                                        const td = document.createElement('td');
                                        td.textContent = col;
                                        if (headers[idx] && headers[idx].toLowerCase().includes('team')) td.style.textAlign = 'left';
                                        tr.appendChild(td);
                                    });
                                    tbody.appendChild(tr);
                                }
                            });
                        </script>
        </main>
        <button class="buttonsize buttoncolor"><a href="primeriraliga.html"><spanPrevious>Previous</spanPrevious></a></button>
        <button class="buttonsize buttoncolor" style="left: 7.5vw"><a href="homepage.html"><spanHome>Home</spanHome></a></button>
        <button class="buttonsize buttoncolor" style="left: 14vw"><a href="seriaA.html"><spanNext>Next</spanNext></a></button>
    
    </body>
    <script>
        document.querySelector("body").style.backgroundColor = "rgb(0, 210, 220)";
    </script>
</html>
