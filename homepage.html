<!DOCTYPE html>

    <head>

    <style>
        .titled
        {
            position: absolute;
            font-size: large;
            border-style: double;
            padding-top: 5px;
            padding-left: 5px;
            padding-bottom: 5px;
            left: 1.5vw;
            right: 90.5vw;
            top: 3vh;
 

        }

        .imagesize
        {
            position: absolute;
            width: 10vw;
            height: auto;
            top:50%;
            left:50%;
            transform: translate(-50%, -50%);
            

        }

        .imagebutton
        {
            position: relative;
            border-color: rgb(255, 255, 255);
            width: 9vw;
            height: 9vw;
            background-color: rgb(6, 65, 29);

            opacity: 0.6;
            transition: 0.3s;
        }
        .imagebutton:hover{
            opacity:2;
        }

        .infobutton      
        {
            position: absolute;
            bottom: 3vh;
            right: 2vw;
            width: 6vw;
            height: 5vh;
            font-size: large;
            border-color: black;
            border-radius: 3px;
            opacity: 0.6;
            transition: 0.3s;
        }
        .infobutton:hover{
            opacity:2;
        }

    </style>
